<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <header>
        <div class="header">
             <h3>Rock Paper Scissors</h3>
        </div>
    </header>
    <main>

        <div class="images">

            <div class="img1 image" id="paper">
                <img src="img1.png" alt="">
            </div>

            <div class="img2 image" id="scissor">
                <img class="image2" src="img2.png" alt="">
            </div>

            <div class="img3 image" id="rock">
                <img class="image3" src="img3.png" alt="">
            </div>

        </div>
        <div class="scores">

            <div class="myscores">
                <h2 id="userscore">0</h2>
                <p>YOUR SCORE</p>
            </div>

            <div class="compscores">
                <h2 id="compscore">0</h2>
                <p>COMP SCORE</p>

            </div>

        </div>

    </main>

    <footer>
        <div class="status">
            <p id="status">Start the Game!</p>
        </div>
    </footer>


    <script src="script.js"></script>
</body>
</html>
